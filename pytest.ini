[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -ra
    --strict-markers
    --tb=short
    --alluredir=allure-results
    --tracing=retain-on-failure
    --screenshot=only-on-failure
    --video=retain-on-failure
    --reruns=1
    --reruns-delay=2

markers =
    smoke: критичные базовые проверки
    positive: основные сценарии успеха
    negative: проверка ошибок и валидации
    edge_case: граничные случаи из BRD §9
    rbac: проверка прав доступа
    e2e: сквозной сценарий
    serial: запускать последовательно (EIMZO, конфликты)
    eimzo_local_only: требует физическую ЭЦП-флешку
    maintenance: обслуживающие задачи
    allow_console_errors: отключает strict-console guard для теста (см. conftest._strict_console)
    creates_data: тест создаёт/изменяет данные в БД через UI. Запускать только когда явно надо
    regression: регрессионный тест на конкретный известный баг (xfail strict — XPASS = баг починен)
    visual: pixel-сравнение скриншотов с baseline (tests/visual/)
    allow_uz_default: отключает _force_ru_lang (когда тест намеренно проверяет UZ default)
