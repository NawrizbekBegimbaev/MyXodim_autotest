[pytest]
testpaths = tests
norecursedirs = archive _core_src .venv .git node_modules
addopts =
    --strict-markers
    -ra
    --tracing=retain-on-failure
    --screenshot=only-on-failure
    --video=retain-on-failure
    --output=test-results

markers =
    sanity: ежедневный sanity-набор (smoke + happy-path)
    smoke: критичные базовые проверки (UI грузятся, логины работают)
    happy_path: основной пользовательский сценарий до черновика
    client: тесты Client UI
    admin: тесты Admin UI
    mock1c: тесты Mock 1C UI

# Базовые таймауты — в коде не хардкодим.
# Playwright expect timeout (ms)
faulthandler_timeout = 180
